<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pronósticos Fútbol Pro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh}
  .container{max-width:960px;margin:0 auto;padding:16px}
  h1{font-size:20px;font-weight:600;color:#fff;margin-bottom:3px}
  .subtitle{font-size:12px;color:#888;margin-bottom:16px}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:#1a3a1a;color:#4caf50;font-weight:600;margin-left:8px;vertical-align:middle}
  .status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:14px;padding:8px 12px;background:#1a1a1a;border-radius:8px}
  .dot-green{width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0}
  .dot-red{width:8px;height:8px;border-radius:50%;background:#f44336;flex-shrink:0}
  .lbl{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .league-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .lb{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;white-space:nowrap}
  .lb:hover{border-color:#555;color:#ccc}
  .lb.on{background:#1e2a3a;color:#3b82f6;border-color:#3b82f6;font-weight:500}
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .date-row label{font-size:12px;color:#888}
  .date-input{background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;padding:6px 10px;font-size:13px;cursor:pointer}
  .date-input:focus{outline:none;border-color:#3b82f6}
  .date-nav{display:flex;gap:4px}
  .date-nav button{background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#aaa;padding:5px 10px;cursor:pointer;font-size:13px}
  .date-nav button:hover{border-color:#555;color:#fff}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;margin-bottom:16px}
  .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:10px 12px;cursor:pointer}
  .card:hover{border-color:#444}
  .card.sel{border:2px solid #3b82f6;background:#0f1e35}
  .teams{display:flex;align-items:center;justify-content:space-between;gap:4px}
  .tn{font-size:12px;font-weight:600;color:#fff;flex:1}
  .tn.away{text-align:right}
  .vs{font-size:11px;color:#555;white-space:nowrap}
  .mtime{font-size:11px;color:#888;margin-top:4px}
  .ref{font-size:11px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sel-info{font-size:13px;color:#3b82f6;margin-bottom:10px;font-weight:500;display:none}
  .tabs{display:none;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .tab{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid #333;background:transparent;color:#888;cursor:pointer}
  .tab.on{background:#1e1e1e;color:#fff;border-color:#555;font-weight:500}
  .abtn{width:100%;padding:12px;font-size:15px;font-weight:600;cursor:pointer;border-radius:10px;border:1px solid #333;background:#1a1a1a;color:#fff;margin-bottom:16px}
  .abtn:hover:not(:disabled){background:#252525}
  .abtn:disabled{opacity:.4;cursor:not-allowed}
  .box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:16px;min-height:100px}
  .ph{color:#555;font-size:14px;text-align:center;padding:2rem 0}
  .err{color:#f87171;font-size:13px;padding:12px;background:#1f0f0f;border-radius:8px;text-align:center}
  .dots{display:flex;align-items:center;gap:6px;color:#666;font-size:13px;padding:2rem 0;justify-content:center}
  .dot{width:7px;height:7px;border-radius:50%;background:#555;animation:pu 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes pu{0%,100%{opacity:.2}50%{opacity:1}}
  .result{font-size:13px;color:#ddd;line-height:1.8}
  .result h2{font-size:15px;font-weight:600;color:#3b82f6;margin:20px 0 8px;border-left:3px solid #3b82f6;padding-left:10px}
  .result h3{font-size:13px;font-weight:600;color:#aaa;margin:12px 0 5px}
  .result p{margin-bottom:10px;line-height:1.7}
  .result table{width:100%;border-collapse:collapse;margin:6px 0 14px;font-size:13px}
  .result table th{background:#252525;color:#aaa;padding:7px 10px;text-align:center;font-weight:600;border:1px solid #333;font-size:12px}
  .result table td{padding:6px 10px;text-align:center;border:1px solid #2a2a2a;color:#ddd}
  .result table tr:nth-child(even) td{background:#1e1e1e}
  .result table tr:hover td{background:#252525}
  .result table td:first-child{font-weight:600;color:#fff}
  .result strong{color:#fff}
  .warning{background:#1a1500;border:1px solid #3a3000;border-radius:8px;padding:10px 14px;margin-top:14px;color:#f59e0b;font-size:13px}
  @media(max-width:600px){
    .grid{grid-template-columns:1fr 1fr}
    .result table{font-size:11px}
    .result table th,.result table td{padding:5px 6px}
    h1{font-size:17px}
  }
</style>
</head>
<body>
<div class="container">
  <h1>⚽ Pronósticos Fútbol <span class="badge">Pro</span></h1>
  <p class="subtitle">Datos reales API-Football + Prompt Maestro v2.0 via Claude IA</p>
  <div class="status-bar">
    <div class="dot-red" id="statusDot"></div>
    <span id="statusText">Conectando...</span>
  </div>

  <div class="lbl">Liga</div>
  <div class="league-selector">

    <button class="lb" onclick="selectLeague(this,78,2024)">🇩🇪 Bundesliga</button>
    <button class="lb" onclick="selectLeague(this,135,2024)">🇮🇹 Serie A</button>
    <button class="lb" onclick="selectLeague(this,61,2024)">🇫🇷 Ligue 1</button>
    <button class="lb" onclick="selectLeague(this,556,2024)">🇪🇸 Copa Rey</button>
    <button class="lb" onclick="selectLeague(this,11,2025)">🇨🇴 Liga Col.</button>
    <button class="lb" onclick="selectLeague(this,13,2025)">🌎 Libertadores</button>
  </div>

  <div class="date-row">

  <div class="box" id="box"><div class="ph">Selecciona una liga, fecha y partido</div></div>
</div>

<script>
const PROXY=window.location.origin+'/api';

var TEAMS={
  'Germany':'Alemania','France':'Francia','Spain':'España','Portugal':'Portugal',
  'Brazil':'Brasil','Argentina':'Argentina','England':'Inglaterra','Italy':'Italia',
  'Netherlands':'Países Bajos','Belgium':'Bélgica','Croatia':'Croacia','Poland':'Polonia',
  'Denmark':'Dinamarca','Switzerland':'Suiza','Austria':'Austria','Sweden':'Suecia',
  'Norway':'Noruega','Czech Republic':'República Checa','Serbia':'Serbia','Turkey':'Turquía',
  'Morocco':'Marruecos','Ivory Coast':'Costa de Marfil','Nigeria':'Nigeria','Cameroon':'Camerún',
  'Egypt':'Egipto','Tunisia':'Túnez','South Africa':'Sudáfrica','Japan':'Japón',
  'South Korea':'Corea del Sur','Australia':'Australia','Iran':'Irán',
  'Saudi Arabia':'Arabia Saudita','Qatar':'Catar','Mexico':'México',
  'United States':'Estados Unidos','USA':'Estados Unidos','Canada':'Canadá',
  'Ecuador':'Ecuador','Colombia':'Colombia','Uruguay':'Uruguay','Chile':'Chile',
  'Peru':'Perú','Paraguay':'Paraguay','Bolivia':'Bolivia','Venezuela':'Venezuela',
  'Costa Rica':'Costa Rica','Panama':'Panamá','Honduras':'Honduras','Curacao':'Curazao',
  'New Zealand':'Nueva Zelanda','Wales':'Gales','Scotland':'Escocia','Greece':'Grecia',
  'Romania':'Rumanía','Hungary':'Hungría','Slovakia':'Eslovaquia','Georgia':'Georgia',
  'Real Madrid':'Real Madrid','Barcelona':'Barcelona','Atletico Madrid':'Atlético Madrid',
  'Sevilla':'Sevilla','Valencia':'Valencia','Villarreal':'Villarreal',
  'Bayern Munich':'Bayern Múnich','Borussia Dortmund':'Borussia Dortmund',
  'Inter':'Inter','Juventus':'Juventus','AC Milan':'AC Milan','Napoli':'Nápoles',
  'Roma':'Roma','Lazio':'Lazio','Atalanta':'Atalanta',
  'PSG':'PSG','Paris Saint Germain':'PSG','Marseille':'Marsella','Lyon':'Lyon','Monaco':'Mónaco',
  'Atletico Nacional':'Atlético Nacional','Millonarios':'Millonarios',
  'America de Cali':'América de Cali','Junior':'Junior','Santa Fe':'Santa Fe',
  'Deportivo Cali':'Deportivo Cali','Independiente Medellin':'Independiente Medellín',
  'Deportes Tolima':'Deportes Tolima','Once Caldas':'Once Caldas',
};
function tr(n){return TEAMS[n]||n;}

const CLAUDE=window.location.origin+'/claude';
let sel=null,tab='completo',currentLeague={id:1,season:2026};

function api(ep,params={}){
  const qs=new URLSearchParams({ep,...params}).toString();
  return fetch(`${PROXY}?${qs}`).then(r=>r.json());
}
function safe(v,fb='N/D'){return(v!==null&&v!==undefined&&v!=='undefined')?v:fb;}
function setTab(el,t){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');}

function getToday(){
  // Fecha local del navegador (Colombia UTC-5)
  const now=new Date();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,'0');
  const d=String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function setToday(){document.getElementById('dateInput').value=getToday();loadFixtures();}
function changeDate(days){
  const parts=document.getElementById('dateInput').value.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  d.setDate(d.getDate()+days);
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  document.getElementById('dateInput').value=`${y}-${m}-${dd}`;
  loadFixtures();
}

function selectLeague(el,id,season){
  currentLeague={id,season};
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  sel=null;
  document.getElementById('selInfo').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('btn').disabled=true;
  document.getElementById('box').innerHTML='<div class="ph">Selecciona un partido</div>';
  loadFixtures();
}

function renderMarkdown(text){
  const lines=text.split('\n');
  let html='',inTable=false,tableRows=[];
  function flushTable(){
    if(!tableRows.length)return;
    let t='<table><thead><tr>';
    tableRows[0].forEach(h=>t+=`<th>${h}</th>`);
    t+='</tr></thead><tbody>';
    for(let i=2;i<tableRows.length;i++){t+='<tr>';tableRows[i].forEach(c=>t+=`<td>${c}</td>`);t+='</tr>';}
    t+='</tbody></table>';
    html+=t;tableRows=[];inTable=false;
  }
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(line.trim().startsWith('|')&&line.trim().endsWith('|')){
      inTable=true;
      const cells=line.trim().split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>c.trim());
      if(!cells.every(c=>/^[-:]+$/.test(c)))tableRows.push(cells);
    }else{
      if(inTable)flushTable();
      if(line.startsWith('## ')){html+=`<h2>${line.replace(/^## /,'')}</h2>`;}
      else if(line.startsWith('### ')){html+=`<h3>${line.replace(/^### /,'')}</h3>`;}
      else if(line.startsWith('**')&&line.endsWith('**')&&line.length>4){html+=`<h3>${line.replace(/\*\*/g,'')}</h3>`;}
      else if(line.startsWith('• ')||line.startsWith('- ')){html+=`<li>${ri(line.substring(2))}</li>`;}
      else if(line.toLowerCase().includes('advertencia')||line.startsWith('⚠️')){html+=`<div class="warning">${ri(line)}</div>`;}
      else if(line.trim()){html+=`<p>${ri(line)}</p>`;}
    }
  }
  if(inTable)flushTable();
  return html;
}
function ri(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}

async function loadFixtures(){
  document.getElementById('matchLbl').textContent='Cargando partidos...';
  document.getElementById('grid').innerHTML='<div style="grid-column:1/-1"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  try{
    const {id,season}=currentLeague;
    const date=document.getElementById('dateInput').value||getToday();
    // Buscar también día siguiente por diferencia UTC-5 Colombia
    const parts=date.split('-');
    const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    d.setDate(d.getDate()+1);
    const nextDate=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const [data1,data2]=await Promise.all([
      api('fixtures',{league:id,season,date}),
      api('fixtures',{league:id,season,date:nextDate})
    ]);
    // Combinar y filtrar por fecha local seleccionada
    const allFx=[...(data1.response||[]),...(data2.response||[])];
    // Filtrar partidos cuya hora local (UTC-5) corresponde al día seleccionado
    let fx=allFx.filter(f=>{
      const localDate=new Date(new Date(f.fixture.date).getTime()-5*60*60*1000);
      const ld=`${localDate.getUTCFullYear()}-${String(localDate.getUTCMonth()+1).padStart(2,'0')}-${String(localDate.getUTCDate()).padStart(2,'0')}`;
      return ld===date;
    });
    // Eliminar duplicados por id
    fx=[...new Map(fx.map(f=>[f.fixture.id,f])).values()];
    if(!fx.length){
      const data3=await api('fixtures',{league:id,season,status:'NS',next:20});
      fx=data3.response||[];
    }
    document.getElementById('statusDot').className='dot-green';
    document.getElementById('statusText').textContent=`Proxy ✅ — ${fx.length} partidos`;
    document.getElementById('matchLbl').textContent=`Partidos — ${fx.length} encontrados`;
    if(!fx.length){document.getElementById('grid').innerHTML='<div class="ph" style="grid-column:1/-1">No hay partidos para esta fecha/liga</div>';return;}
    document.getElementById('grid').innerHTML=fx.map(f=>{
      const home=tr(f.teams.home.name),away=tr(f.teams.away.name);
      const ref=f.fixture.referee?f.fixture.referee.split(',')[0]:'Por confirmar';
      const dt=new Date(f.fixture.date);
      const t=dt.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
      const live=['1H','HT','2H','ET'].includes(f.fixture.status.short);
      const done=['FT','AET','PEN'].includes(f.fixture.status.short);
      const score=done?`${f.goals.home}-${f.goals.away}`:'';
      return `<div class="card" onclick="pick(${f.fixture.id},'${home.replace(/'/g,"\\'")}','${away.replace(/'/g,"\\'")}','${ref.replace(/'/g,"\\'")}','${t}',${f.teams.home.id},${f.teams.away.id})" id="c${f.fixture.id}">
        <div class="teams"><span class="tn">${home}</span><span class="vs">${live?'🔴 EN VIVO':done?score:'vs'}</span><span class="tn away">${away}</span></div>
        <div class="mtime">🕐 ${t}</div><div class="ref">🏳️ ${ref}</div>
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('statusText').textContent='Error: proxy no responde';
    document.getElementById('grid').innerHTML=`<div class="err" style="grid-column:1/-1">Ejecuta: node proxy.js<br><small>${e.message}</small></div>`;
  }
}

function pick(id,home,away,ref,time,homeId,awayId){
  sel={id,home,away,ref,time,homeId,awayId};
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('c'+id).classList.add('sel');
  const si=document.getElementById('selInfo');
  si.style.display='block';
  si.textContent=`✅ ${home} vs ${away} — árbitro: ${ref}`;
  document.getElementById('tabs').style.display='flex';
  document.getElementById('btn').disabled=false;
  document.getElementById('box').innerHTML='<div class="ph">Presiona "Generar análisis con IA"</div>';
}

async function run(){
  if(!sel)return;
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='Analizando...';
  const box=document.getElementById('box');
  box.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div> Generando pronóstico...</div>';

  const focusMap={
    completo:`Genera informe completo con tablas markdown (| col | col |):

## SECCIÓN 1 — CONTEXTO
Párrafo: situación torneo, motivación, bajas, árbitro perfil, riesgos y sesgos.

## SECCIÓN 6 — CÓRNERS POR TIEMPO

## SECCIÓN 9 — ATAJADAS PORTEROS

Por portero: líneas 0.5-4.5

## SECCIÓN 12 — RESULTADO 1X2
| Resultado | Probabilidad |
Victoria ${sel.home} / Empate / Victoria ${sel.away}

## SECCIÓN 13 — 3 MARCADORES MÁS PROBABLES
| # | Marcador | Probabilidad |

## SECCIÓN 14 — HÁNDICAP ASIÁTICO
| Hándicap | ${sel.home} | ${sel.away} |
-0.5/+0.5, -0.75/+0.75, -1.0/+1.0, -1.25/+1.25, -1.5/+1.5, -1.75/+1.75, -2.0/+2.0, -2.25/+2.25, -2.5/+2.5, -2.75/+2.75, -3.0/+3.0

## SECCIÓN 15 — TOTAL ASIÁTICO
| Total Asiático | MÁS% | MENOS% |
2.0, 2.25, 2.5, 2.75, 3.0, 3.25, 3.5, 4.0, 4.5, 5.0

## SECCIÓN 16 — PICKS SÓLIDAS (máx 5, solo ≥62%)
**Pick #N:** Mercado | Probabilidad | Sustento | Anti-sesgo`,

    picks:`SOLO SECCIÓN 16 — 3-5 picks ≥62%:
**Pick #N**
- **Mercado:** [exacto]
- **Probabilidad real:** XX%
- **Sustento:** [datos]

    corners:`SOLO secciones 2,3,4,5,6,7,8 con tablas markdown completas (MÁS+MENOS=100%).`,
